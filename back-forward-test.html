<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back/Forward Button Test</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    .log { border: 1px solid #ccc; padding: 10px; margin: 10px 0; background: #f5f5f5; min-height: 200px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .event { padding: 5px; border-bottom: 1px solid #ddd; }
    .back { color: green; }
    .forward { color: blue; }
    .popstate { background: #fffacd; }
    .pageshow { background: #e0f0ff; }
    button { padding: 10px 20px; margin: 5px; font-size: 14px; cursor: pointer; }
    button.back { background: green; color: white; }
    button.forward { background: blue; color: white; }
    .info { background: #fffacd; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Back/Forward Button Detection Test</h1>
  
  <div class="info">
    <p><strong>Instructions:</strong></p>
    <ol>
      <li>Click "Go to Page 2" button</li>
      <li>Click "Go to Page 3" button</li>
      <li>Click browser <strong>BACK</strong> button - watch for events below</li>
      <li>Click browser <strong>FORWARD</strong> button - watch for events below</li>
    </ol>
  </div>

  <div>
    <button onclick="goToPage(2)">Go to Page 2</button>
    <button onclick="goToPage(3)">Go to Page 3</button>
    <button class="back" onclick="window.history.back()">← Back Button</button>
    <button class="forward" onclick="window.history.forward()">Forward Button →</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>

  <h2>Event Log:</h2>
  <div class="log" id="log"></div>

  <script>
    const logDiv = document.getElementById('log');
    let eventCount = 0;

    function logEvent(type, details = '') {
      eventCount++;
      const event = document.createElement('div');
      event.className = 'event ' + type + (details.includes('back') ? ' back' : details.includes('forward') ? ' forward' : '') + ' ' + (type === 'popstate' ? 'popstate' : 'pageshow');
      event.textContent = `[${eventCount}] ${new Date().toLocaleTimeString()}.${Date.now() % 1000} - ${type.toUpperCase()}${details ? ': ' + details : ''}`;
      logDiv.insertBefore(event, logDiv.firstChild);
      
      // Keep only last 50 events
      while (logDiv.children.length > 50) {
        logDiv.removeChild(logDiv.lastChild);
      }
    }

    function clearLog() {
      logDiv.innerHTML = '';
      eventCount = 0;
    }

    function goToPage(page) {
      window.history.pushState({page: page}, `Page ${page}`, `?page=${page}`);
      document.title = `Page ${page} - Back/Forward Test`;
      logEvent('navigation', `Navigated to page ${page}`);
    }

    // Listen for popstate (back/forward buttons)
    window.addEventListener('popstate', (event) => {
      const page = event.state?.page || 'unknown';
      logEvent('popstate', `Navigated to page ${page}`);
    });

    // Listen for pageshow (bfcache restoration)
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        logEvent('pageshow', 'Page restored from cache (persisted=true)');
      } else {
        logEvent('pageshow', 'Page shown normally (persisted=false)');
      }
    });

    // Listen for page unload
    window.addEventListener('unload', () => {
      logEvent('unload', 'Page unloading');
    });

    logEvent('ready', 'Page loaded - ready for testing');
  </script>
</body>
</html>
